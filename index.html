<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baan Brownie - Shopping Cart</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdfcfb; min-height: 100vh; }
        .bg-thai-dark { background-color: #3d2b1f; }
        .thai-gold { color: #b8860b; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-5px); }
        .btn-add { background: #3d2b1f; color: white; transition: all 0.2s; }
        .btn-add:active { transform: scale(0.9); }
        .badge-count { position: absolute; top: -10px; right: -10px; background: #b8860b; color: white; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border: 2px solid white; }
        .loader { border-top-color: #b8860b; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-thai-dark text-white p-8 rounded-b-[3rem] shadow-2xl text-center animate__animated animate__fadeInDown">
        <h1 class="text-3xl font-bold tracking-tight">เรือนขนมหวาน</h1>
        <p class="text-xs opacity-70 mt-1 uppercase tracking-widest font-light">Freshly Baked Every Day</p>
    </header>

    <main class="max-w-md mx-auto px-5 mt-8">
        
        <!-- Product Grid -->
        <div class="flex justify-between items-center mb-5 ml-1 animate__animated animate__fadeInLeft">
            <h2 class="text-gray-800 font-semibold">เมนูของว่างวันนี้ 🍪</h2>
        </div>
        
        <div id="product-list" class="grid grid-cols-2 gap-5 animate__animated animate__fadeInUp">
            <!-- Products will be generated by JS -->
        </div>

        <!-- Cart Summary / Delivery Form -->
        <div id="order-form" class="mt-10 hidden animate__animated animate__fadeIn">
            <div class="glass-card rounded-[2.5rem] p-8 shadow-2xl">
                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="mr-2">🛒</span> ตะกร้าสินค้าของคุณ
                </h2>

                <!-- Items in Cart -->
                <div id="cart-items-list" class="space-y-4 mb-6 border-b pb-6">
                    <!-- Cart items here -->
                </div>

                <!-- Total -->
                <div class="flex justify-between items-center mb-8 bg-amber-50 p-5 rounded-3xl border border-amber-100">
                    <span class="text-gray-600 font-medium">ยอดรวมสุทธิ</span>
                    <span id="total-price" class="text-3xl font-bold thai-gold">0.-</span>
                </div>

                <!-- Delivery Details -->
                <div class="space-y-4 mb-8">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">ชื่อผู้รับ</label>
                        <input type="text" id="receiver-name" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-amber-200 transition-all" placeholder="ระบุชื่อ">
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">สถานที่รับ</label>
                            <input type="text" id="pickup-location" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-amber-200 transition-all" placeholder="ตึก/ห้อง">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2 text-center">เวลา</label>
                            <input type="time" id="pickup-time" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-amber-200 transition-all text-center">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">ข้อมูลติดต่อ</label>
                        <input type="tel" id="contact-info" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-amber-200 transition-all" placeholder="0xx-xxx-xxxx">
                    </div>
                </div>

                <!-- Payment Area -->
                <div class="text-center bg-white rounded-[2rem] p-6 mb-8 shadow-inner border border-gray-50">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-3 tracking-widest">PromptPay Payment</p>
                    <img id="qr-img" src="" alt="QR" class="mx-auto rounded-xl w-48 mb-3 shadow-md animate__animated animate__zoomIn">
                    <p class="text-xs text-gray-400 font-medium tracking-tighter">เลขบัญชี: 096-986-6245</p>
                </div>

                <!-- Slip Upload -->
                <div class="mb-8">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-3 text-center tracking-widest">แนบสลิปยืนยันการโอน</label>
                    <label class="flex flex-col items-center justify-center w-full h-36 border-2 border-gray-200 border-dashed rounded-[2rem] cursor-pointer bg-gray-50 hover:bg-amber-50 hover:border-amber-200 transition-all overflow-hidden">
                        <div id="slip-placeholder" class="text-center">
                            <span class="text-4xl mb-2 block">📸</span>
                            <p class="text-[10px] text-gray-400">คลิกเพื่ออัปโหลดรูปภาพสลิป</p>
                        </div>
                        <img id="slip-preview" class="hidden h-full w-full object-cover" src="">
                        <input id="slip-input" type="file" class="hidden" accept="image/*" onchange="previewSlip(event)" />
                    </label>
                </div>

                <!-- Submit Button -->
                <button id="submit-btn" onclick="confirmOrder()" class="w-full bg-thai-dark text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all flex justify-center items-center">
                    <span>ยืนยันการสั่งซื้อ</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Floating Cart Badge -->
    <div id="floating-cart" class="fixed bottom-6 right-6 z-50 hidden animate__animated animate__bounceIn">
        <button onclick="scrollToOrder()" class="bg-thai-dark text-white p-5 rounded-full shadow-2xl relative">
            <span class="text-2xl">🛒</span>
            <div id="cart-count-badge" class="badge-count">0</div>
        </button>
    </div>

    <script>
        const products = [
            { id: 1, name: 'บราวนี่', price: 20, emoji: '🍫' },
            { id: 2, name: 'น้ำส้มคั้นสด', price: 25, emoji: '🍊' },
            { id: 3, name: 'คุกกี้เนยสด', price: 15, emoji: '🍪' },
            { id: 4, name: 'แซนด์วิชแฮมชีส', price: 35, emoji: '🥪' }
        ];

        let cart = {}; 
        let userName = "Guest";
        let slipBase64 = "";
        const LIFF_ID = "2009449795";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOHKFRnqQW5ePnlFFOOnMs__G1B9XfynCqaMb9WP9oRp1_u3aQJF7SHI7NxPYQX18NsA/exec";

        // Initialize LIFF
        liff.init({ liffId: LIFF_ID }).then(() => {
            if (!liff.isLoggedIn()) liff.login();
            liff.getProfile().then(p => userName = p.displayName);
        });

        // Generate Product Grid
        const productList = document.getElementById('product-list');
        products.forEach(p => {
            productList.innerHTML += `
                <div class="product-card glass-card p-5 rounded-[2rem] text-center shadow-lg relative">
                    <div class="text-5xl mb-3">${p.emoji}</div>
                    <h3 class="font-bold text-gray-800">${p.name}</h3>
                    <p class="thai-gold font-bold mb-3">${p.price}.-</p>
                    <button onclick="addToCart(${p.id})" class="btn-add w-full py-2 rounded-xl text-xs font-bold uppercase tracking-widest">
                        เพิ่มลงตะกร้า
                    </button>
                </div>
            `;
        });

        function addToCart(id) {
            cart[id] = (cart[id] || 0) + 1;
            updateUI();
            const badge = document.getElementById('floating-cart');
            badge.classList.remove('animate__bounceIn');
            void badge.offsetWidth; 
            badge.classList.add('animate__bounceIn');
        }

        function removeFromCart(id) {
            if (cart[id] > 0) {
                cart[id]--;
                if (cart[id] === 0) delete cart[id];
            }
            updateUI();
        }

        function updateUI() {
            let total = 0;
            let count = 0;
            const cartItemsList = document.getElementById('cart-items-list');
            cartItemsList.innerHTML = '';

            Object.keys(cart).forEach(id => {
                const p = products.find(prod => prod.id == id);
                const subtotal = p.price * cart[id];
                total += subtotal;
                count += cart[id];

                cartItemsList.innerHTML += `
                    <div class="flex justify-between items-center animate__animated animate__fadeInLeft">
                        <div>
                            <p class="font-bold text-gray-800">${p.emoji} ${p.name}</p>
                            <p class="text-[10px] text-gray-400">${p.price}.- x ${cart[id]}</p>
                        </div>
                        <div class="flex items-center space-x-3">
                            <button onclick="removeFromCart(${id})" class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold hover:bg-gray-200 transition-colors">-</button>
                            <span class="font-bold text-sm min-w-[20px] text-center">${cart[id]}</span>
                            <button onclick="addToCart(${id})" class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold hover:bg-gray-200 transition-colors">+</button>
                            <span class="font-bold text-gray-800 ml-4 w-16 text-right">${subtotal}.-</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-price').innerText = total + ".-";
            document.getElementById('cart-count-badge').innerText = count;
            
            const form = document.getElementById('order-form');
            const floating = document.getElementById('floating-cart');
            
            if (count > 0) {
                form.classList.remove('hidden');
                floating.classList.remove('hidden');
                document.getElementById('qr-img').src = `https://promptpay.io/0969866245/${total}.png`;
            } else {
                form.classList.add('hidden');
                floating.classList.add('hidden');
            }
        }

        function scrollToOrder() {
            document.getElementById('order-form').scrollIntoView({ behavior: 'smooth' });
        }

        function previewSlip(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('slip-placeholder').classList.add('hidden');
                    const prev = document.getElementById('slip-preview');
                    prev.src = e.target.result;
                    prev.classList.remove('hidden');
                    slipBase64 = e.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        }

        function confirmOrder() {
            const receiverName = document.getElementById('receiver-name').value;
            const location = document.getElementById('pickup-location').value;
            const time = document.getElementById('pickup-time').value;
            const contact = document.getElementById('contact-info').value;

            if (!receiverName || !location || !time || !contact || !slipBase64) {
                alert("กรุณากรอกข้อมูลและแนบสลิปให้ครบถ้วนนะครับ 🙏");
                return;
            }

            let orderSummary = Object.keys(cart).map(id => {
                const p = products.find(prod => prod.id == id);
                return `${p.name} x${cart[id]}`;
            }).join(', ');

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loader rounded-full border-2 h-4 w-4 mr-2"></div> กำลังส่งข้อมูล...';

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    userName: userName,
                    receiverName: receiverName,
                    location: location,
                    time: time,
                    contact: contact,
                    items: orderSummary,
                    amount: document.getElementById('total-price').innerText.replace('.-',''),
                    slipData: slipBase64
                })
            })
            .then(res => res.json())
            .then(res => {
                if(res.result === "success") {
                    alert("บันทึกออเดอร์เรียบร้อย ขอบคุณที่อุดหนุนครับ! ✨");
                    liff.closeWindow();
                } else {
                    alert("ขออภัย เกิดข้อผิดพลาด: " + res.message);
                    btn.disabled = false;
                    btn.innerText = "ส่งคำสั่งซื้ออีกครั้ง";
                }
            })
            .catch(() => {
                alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ โปรดตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
                btn.disabled = false;
                btn.innerText = "ส่งคำสั่งซื้ออีกครั้ง";
            });
        }
    </script>
</body>
</html>
